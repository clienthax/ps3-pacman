name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    strategy:
      matrix:
        os: [alpine:latest, fedora:latest, debian:latest]
      fail-fast: false

    steps:
    - name: Install Debian build dependencies
      if: startsWith(matrix.os, 'debian')
      run: |
        apt-get update
        apt-get install -y wget adduser build-essential meson ninja-build makepkg pkgconf curl libcurl4 libcurl4-openssl-dev libssl-dev libarchive-tools libarchive-dev libgpgme-dev git sudo
        adduser --system --group build

    - name: Install Alpine build dependencies
      if: startsWith(matrix.os, 'alpine')
      run: |
        apk add wget wget build-base bash meson ninja-build pacman pkgconfig libarchive-tools libarchive-dev openssl-dev gpgme-dev curl-dev git sudo fakeroot curl
        adduser -D -s /bin/bash build

    - name: Install Fedora build dependencies
      if: startsWith(matrix.os, 'fedora')
      run: |
        dnf -y install gcc meson ninja-build makepkg wget bsdtar libarchive-devel openssl-devel gpgme-devel libcurl-devel pkgconf git patch sudo which fakeroot curl
        useradd build

    - uses: actions/checkout@v6

    - name: Compile ps3-pacman
      run: |
        export PS3DEV=$PWD/ps3dev
        export PATH="$PATH:$PS3DEV/bin"
        chown -R build:build .
        sudo -u build PATH="${PATH}" PS3DEV="${PS3DEV}" ./build-and-install.sh
        ps3-pacman -V

    - name: Create archive
      run: |
        ARCH="$(./get-arch)"
        echo "ARCH=${ARCH}" >> $GITHUB_ENV
        tar -czvf pspdev-${ARCH}.tar.gz pspdev

    - uses: actions/upload-artifact@v7
      with:
        name: artifact-${{ env.ARCH }}
        path: |
          ps3-pacman-*.pkg.tar.gz
          ps3dev-*.tar.gz

    - name: Test ps3-pacman
      run: |
        export PS3DEV="$PWD/ps3dev"
        export PATH="$PATH:$PS3DEV/bin"
        psp-pacman -Syu --noconfirm --noprogressbar stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm


  build-VM:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Install Ubuntu build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get -y install meson libcurl4-openssl-dev libarchive-tools libarchive-dev libgpgme-dev

    - name: Install Mac build dependencies
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install bash meson gnu-sed libarchive gpgme

    - name: Compile ps3-pacman
      run: |
        export PS3DEV=$PWD/ps3dev
        export PATH="$PATH:$PS3DEV/bin"
        sudo PATH="${PATH}" PS3DEV="${PS3DEV}" ./build-and-install.sh
        psp-pacman -V

    - name: Create archive
      run: |
        tar -czvf ps3dev-$(./get-arch).tar.gz pspdev

    - uses: actions/upload-artifact@v7
      with:
        name: artifact-${{ matrix.os }}
        path: |
          ps3-pacman-*.pkg.tar.gz
          ps3dev-*.tar.gz

    - name: Test psp-pacman
      run: |
        export PS3DEV=$PWD/ps3dev
        export PATH=$PATH:$PS3DEV/bin
        psp-pacman -Syu --noconfirm stb
        psp-pacman -Qi stb
        psp-pacman -R --noconfirm stb
        psp-pacman -Scc --noconfirm


  package-repo:
    if: contains(github.ref,'refs/heads/master')
    needs: [build, build-VM]
    runs-on: ubuntu-latest
    container: ghcr.io/ps3dev/ps3sdk:latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
    - name: Create repo files
      run: |
        ls -l
        cp artifact-*/* ./
        apk add --no-cache bash coreutils
        ${PS3DEV}/share/pacman/bin/repo-add ps3-pacman.db.tar.gz *.pkg.tar.gz
        mv ps3-pacman.db.tar.gz ps3-pacman.db
        mv ps3-pacman.files.tar.gz ps3-pacman.files
        tar -cvf repo.tar ps3-pacman.db ps3-pacman.files *.pkg.tar.gz ps3dev-*.tar.gz
    - name: Upload repo artifact
      uses: actions/upload-artifact@v7
      with:
        name: github-pages
        path: repo.tar


  publish-repo:
    if: contains(github.ref,'refs/heads/master')
    needs: [package-repo]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


  dispatch:
    if: contains(github.ref,'refs/heads/master')
    needs: [publish-repo]
    runs-on: ubuntu-latest
  
    steps:
    - name: Send Compile action
      run: |
        export DISPATCH_ACTION="$(echo run_build)"
        echo "NEW_DISPATCH_ACTION=$DISPATCH_ACTION" >> $GITHUB_ENV
    - name: Repository Dispatch to ps3toolchain-extra
      uses: peter-evans/repository-dispatch@v4
      with:
        repository: ${{ github.repository_owner }}/ps3toolchain-extra
        token: ${{ secrets.DISPATCH_TOKEN }}
        event-type: ${{ env.NEW_DISPATCH_ACTION }}
        client-payload: '{"ref": "${{ github.ref }}"}'
